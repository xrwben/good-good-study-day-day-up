<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      box-sizing: border-box;
    }
    .rich-text-container {
      border: 1px solid #000;
    }
    .rich-text-toolbar {
      border-bottom: 1px solid #000;
      padding: 5px 0;
    }
    .rich-text-editor {
      width: 100%;
      min-height: 200px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="rich-text-container">
    <div class="rich-text-toolbar">
      <button class="btn-bold" data-cmd="bold">加粗</button>
      <button class="btn-italic" data-cmd="italic">斜体</button>
      <button class="btn-underline" data-cmd="underline">下划线</button>
      <button class="btn-image">图片</button> 
    </div>
    <div class="rich-text-editor" contenteditable="true">
      <!-- <p>请输入...</p> -->
    </div>
  </div>

  <script type="text/javascript">
    const toolbar = document.querySelector('.rich-text-toolbar')
    toolbar.addEventListener('click', (e) => {
      const cmd = e.target.getAttribute('data-cmd')
      if (!cmd) {
        return
      }
      console.log(cmd, e.target.innerText)
      // document.execCommand(cmd, false, null)
      const selectionObj = window.getSelection()
      const txt = selectionObj.toString()
      console.log('选中的对象', selectionObj, selectionObj.toString(), selectionObj.getRangeAt(0)) 
    })

    const insertImage = document.querySelector('.btn-image')
    insertImage.addEventListener('click', (e) => {
      const url = prompt('请输入图片地址：')
      if (!url) {
        return
      }
      console.log('图片地址：', url)
      document.execCommand('insertImage', false, url)
    })


  </script>
</body>
</html>
